# Alembic config for the Talk-to-AI backend.
#
# The DB URL is intentionally empty here — `app.core.config.Config.DATABASE_URL`
# is the single source of truth and is wired in by `alembic/env.py`. This keeps
# prod secrets out of the committed ini file.
#
# Usage from the `backend/` directory:
#   alembic revision --autogenerate -m "<message>"
#   alembic upgrade head
#   alembic stamp head      # mark existing DB as current without re-running DDL

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
